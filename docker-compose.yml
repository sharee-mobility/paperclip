services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: $SERVICE_USER_POSTGRES
      POSTGRES_PASSWORD: $SERVICE_PASSWORD_POSTGRES
      POSTGRES_DB: ${POSTGRES_DB:-paperclip}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
  server:
    build: .
    ports:
      - "3111:3100"
    environment:
      - SERVICE_FQDN_SERVER_3111
      - DATABASE_URL=postgres://$SERVICE_USER_POSTGRES:$SERVICE_PASSWORD_POSTGRES@db:5432/${POSTGRES_DB:-paperclip}
      - PORT=3100
      - SERVE_UI=true
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_DEPLOYMENT_MODE=${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}
      - PAPERCLIP_PUBLIC_URL=https://$SERVICE_FQDN_SERVER
      - BETTER_AUTH_SECRET=$SERVICE_PASSWORD_64_AUTHSECRET
      - PAPERCLIP_SECRETS_STRICT_MODE=true
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
  paperclip-data:
