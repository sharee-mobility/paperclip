services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3111}:3100"
    environment:
      SERVICE_FQDN_PAPERCLIP_3111:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-https://$SERVICE_FQDN_PAPERCLIP}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-$SERVICE_PASSWORD_64_AUTHSECRET}"
      PAPERCLIP_SECRETS_STRICT_MODE: "true"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
